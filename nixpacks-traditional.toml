[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan migrate --force",
  "php artisan config:cache",
  "php artisan route:cache"
]

# PRODUCTION BUILD
# 1. Fire up the SSR engine in the background
# 2. Execute the exact start entrypoint script Nixpacks builds natively for Nginx + PHP-FPM
[start]
cmd = "php artisan inertia:start-ssr > storage/logs/ssr.log 2>&1 & /nixpacks/entrypoint.sh"


# cmd = "php artisan inertia:start-ssr > storage/logs/ssr.log 2>&1 & .nixpacks/variables.sh && nginx -g 'daemon off;'"

