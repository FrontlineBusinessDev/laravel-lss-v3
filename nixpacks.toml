# OCTANE BUILD FOR PRODUCTION READY APPLICATIONS

[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev",
  "php artisan octane:install --server=frankenphp --no-interaction", # Forces the binary download inside the Linux container
]
#  "npm ci"

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan event:cache"
]

[start]
# 1. Run database migrations safely before starting the app
# 2. Start the Inertia SSR node process in the background
# 3. Boot FrankenPHP in the foreground to keep the container running
cmd = "php artisan migrate --force && (php artisan inertia:start-ssr > storage/logs/ssr.log 2>&1 &) && php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000"
